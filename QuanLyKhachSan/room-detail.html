<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết phòng - Quản lý khách sạn</title>
    <link rel="stylesheet" href="room-detail.css">
</head>
<body>
<div class="container">
<!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Quản lý khách sạn</h1>
                <p>Khách sạn Paradise</p>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item " onclick="location.href='dashboard.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Trang chủ</span>
                </button>
                <button class="nav-item active" onclick="location.href='rooms.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 4v16"></path>
                        <path d="M2 8h18a2 2 0 0 1 2 2v10"></path>
                        <path d="M2 17h20"></path>
                        <path d="M6 8v9"></path>
                    </svg>
                    <span>Quản lý phòng</span>
                </button>
                <button class="nav-item" onclick="location.href='booking-list.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Thuê phòng</span>
                </button>
                <button class="nav-item" onclick="showPage('customers')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Khách hàng</span>
                </button>
                <button class="nav-item" onclick="showPage('invoices')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>Hóa đơn</span>
                </button>
                <button class="nav-item" onclick="showPage('reports')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="20" x2="12" y2="10"></line>
                        <line x1="18" y1="20" x2="18" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="16"></line>
                    </svg>
                    <span>Báo cáo</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <p>Admin</p>
                        <small>Quản trị viên</small>
                    </div>
                </div>
            </div>
        </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="rooms.html">Quản lý phòng</a>
            <span>/</span>
            <span>Chi tiết phòng</span>
        </div>

        <!-- HEADER -->
        <div class="page-header">
            <div>
                <h2 id="roomTitle">Chi tiết phòng</h2>
                <span id="roomStatus" class="badge"></span>
            </div>

            <div class="header-actions">
                <!-- ✅ FIX: link sang edit-room.html -->
                <button class="btn-secondary" id="editBtn">
                    Cập nhật
                </button>
            </div>
        </div>

        <!-- DETAIL -->
        <div class="detail-grid">

            <!-- INFO -->
            <div class="section-card">
                <h3>Thông tin phòng</h3>

                <div class="info-grid">
                    <div>Mã phòng: <b id="id"></b></div>
                    <div>Tên phòng: <b id="name"></b></div>
                    <div>Loại phòng: <b id="type"></b></div>
                    <div>Tầng: <b id="floor"></b></div>
                    <div>Giá: <b id="price"></b></div>
                </div>
            </div>

            <!-- EXTRA -->
            <div class="section-card">
                <h3>Thông tin khác</h3>

                <p>Diện tích: 25 m²</p>
                <p>Sức chứa: 2 người</p>
                <p>Giường: 1 giường đôi</p>
                <p>Ghi chú: View đẹp</p>
            </div>

        </div>
    </main>
</div>

<!-- DATA + LOGIC -->
<script src="js/rooms.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const room = rooms.find(r => r.id === id);

    if (!room) {
        document.getElementById("roomTitle").textContent = "Không tìm thấy phòng";
        return;
    }

    // ===== FILL DATA =====
    document.getElementById("roomTitle").textContent = room.name;
    document.getElementById("id").textContent = room.id;
    document.getElementById("name").textContent = room.name;
    document.getElementById("type").textContent = room.typeName;
    document.getElementById("floor").textContent = room.floor;
    document.getElementById("price").textContent =
        Number(room.price).toLocaleString("vi-VN") + " VNĐ";

    // ===== STATUS =====
    const statusEl = document.getElementById("roomStatus");

    if (room.status === "available") {
        statusEl.textContent = "Trống";
        statusEl.className = "badge badge-available";
    } else if (room.status === "occupied") {
        statusEl.textContent = "Đang thuê";
        statusEl.className = "badge badge-occupied";
    } else {
        statusEl.textContent = "Dọn dẹp";
        statusEl.className = "badge badge-maintenance";
    }

    // ===== EDIT BUTTON FIX =====
    document.getElementById("editBtn").onclick = () => {
        window.location.href = `edit-room.html?id=${room.id}`;
    };
});
</script>

</body>
</html>
