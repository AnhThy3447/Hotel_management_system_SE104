<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phòng - Khách sạn</title>
    <link rel="stylesheet" href="css/rooms.css">
</head>
<body>
<div class="container">

    <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Quản lý khách sạn</h1>
                <p>Khách sạn Paradise</p>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item " onclick="location.href='dashboard.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Trang chủ</span>
                </button>
                <button class="nav-item active" onclick="location.href='rooms.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 4v16"></path>
                        <path d="M2 8h18a2 2 0 0 1 2 2v10"></path>
                        <path d="M2 17h20"></path>
                        <path d="M6 8v9"></path>
                    </svg>
                    <span>Quản lý phòng</span>
                </button>
                <button class="nav-item" onclick="location.href='booking-list.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Thuê phòng</span>
                </button>
                <button class="nav-item" onclick="showPage('customers')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Khách hàng</span>
                </button>
                <button class="nav-item" onclick="showPage('invoices')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>Hóa đơn</span>
                </button>
                <button class="nav-item" onclick="showPage('reports')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="20" x2="12" y2="10"></line>
                        <line x1="18" y1="20" x2="18" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="16"></line>
                    </svg>
                    <span>Báo cáo</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <p>Admin</p>
                        <small>Quản trị viên</small>
                    </div>
                </div>
            </div>
        </aside>
    <!-- Main Content -->
    <main class="main-content">

        <div class="page-header">
            <h2>Quản lý phòng</h2>
            <p>Quản lý danh sách phòng và loại phòng</p>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput"
                       placeholder="Tìm kiếm theo mã phòng, tên phòng...">
            </div>

            <div class="filter-group">
                <select id="filterStatus">
                    <option value="">Tất cả trạng thái</option>
                    <option value="available">Trống</option>
                    <option value="occupied">Đang thuê</option>
                    <option value="maintenance">Dọn dẹp</option>
                </select>

                <select id="filterType">
                    <option value="">Tất cả loại phòng</option>
                    <option value="standard">Phòng tiêu chuẩn</option>
                    <option value="deluxe">Phòng cao cấp</option>
                    <option value="suite">Phòng hạng sang</option>
                </select>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms')">Danh sách phòng</button>
            <button class="tab-btn" onclick="switchTab('room-types')">Loại phòng</button>
        </div>

        <!-- ROOMS -->
        <div id="rooms-tab" class="tab-content active">

            <div class="content-header">
                <div class="stats-summary">
                    Tổng: <strong id="totalRooms">0</strong>
                </div>

                <button class="btn-primary" onclick="location.href='rooms-form.html'">
                    + Thêm phòng mới
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th>Mã phòng</th>
                        <th>Tên phòng</th>
                        <th>Loại phòng</th>
                        <th>Tầng</th>
                        <th>Giá/đêm</th>
                        <th>Tình trạng</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    
                    <tbody id="roomTableBody">
                        <!-- JS render -->
                    </tbody>
                </table>

        
            </div>
        </div>

      <!-- ROOM TYPES -->
<div id="room-types-tab" class="tab-content">

    <div class="content-header">
        <div class="stats-summary">
            Tổng: <strong id="total-types">0</strong>
        </div>

        <button class="btn-primary" onclick="location.href='room-type-form.html'">
            + Thêm loại phòng
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>Giá</th>
                    <th>Sức chứa</th>
                    <th>Diện tích</th>
                    <th>Giường</th>
                    <th>Thao tác</th>
                </tr>
            </thead>

            
            <tbody id="room-types-table">
                <!-- JS render -->
            </tbody>
        </table>
    </div>

</div>

<script src="js/rooms.js"></script>
</body>
</html>
