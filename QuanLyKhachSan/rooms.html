<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phòng - Khách sạn</title>
    <link rel="stylesheet" href="css/rooms.css">
</head>
<body>
<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Quản lý khách sạn</h1>
            <p>Hệ thống quản lý</p>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item" onclick="location.href='dashboard.html'">
                <span>Trang chủ</span>
            </button>
            <button class="nav-item active">
                <span>Quản lý phòng</span>
            </button>
            <button class="nav-item" onclick="location.href='booking-list.html'">
                <span>Thuê phòng</span>
            </button>
            <button class="nav-item">
                <span>Khách hàng</span>
            </button>
            <button class="nav-item">
                <span>Hóa đơn</span>
            </button>
            <button class="nav-item">
                <span>Báo cáo</span>
            </button>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <p>Admin</p>
                    <small>Quản trị viên</small>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <div class="page-header">
            <h2>Quản lý phòng</h2>
            <p>Quản lý danh sách phòng và loại phòng</p>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput"
                       placeholder="Tìm kiếm theo mã phòng, tên phòng...">
            </div>

            <div class="filter-group">
                <select id="filterStatus">
                    <option value="">Tất cả trạng thái</option>
                    <option value="available">Trống</option>
                    <option value="occupied">Đang thuê</option>
                    <option value="maintenance">Dọn dẹp</option>
                </select>

                <select id="filterType">
                    <option value="">Tất cả loại phòng</option>
                    <option value="standard">Phòng tiêu chuẩn</option>
                    <option value="deluxe">Phòng cao cấp</option>
                    <option value="suite">Phòng hạng sang</option>
                </select>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms')">Danh sách phòng</button>
            <button class="tab-btn" onclick="switchTab('room-types')">Loại phòng</button>
        </div>

        <!-- ROOMS -->
        <div id="rooms-tab" class="tab-content active">

            <div class="content-header">
                <div class="stats-summary">
                    Tổng: <strong id="totalRooms">0</strong>
                </div>

                <button class="btn-primary" onclick="location.href='rooms-form.html'">
                    + Thêm phòng mới
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th>Mã phòng</th>
                        <th>Tên phòng</th>
                        <th>Loại phòng</th>
                        <th>Tầng</th>
                        <th>Giá/đêm</th>
                        <th>Tình trạng</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    
                    <tbody id="roomTableBody">
                        <!-- JS render -->
                    </tbody>
                </table>

        
            </div>
        </div>

      <!-- ROOM TYPES -->
<div id="room-types-tab" class="tab-content">

    <div class="content-header">
        <div class="stats-summary">
            Tổng: <strong id="total-types">0</strong>
        </div>

        <button class="btn-primary" onclick="location.href='room-type-form.html'">
            + Thêm loại phòng
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>Giá</th>
                    <th>Sức chứa</th>
                    <th>Diện tích</th>
                    <th>Giường</th>
                    <th>Thao tác</th>
                </tr>
            </thead>

            
            <tbody id="room-types-table">
                <!-- JS render -->
            </tbody>
        </table>
    </div>

</div>

<script src="js/rooms.js"></script>
</body>
</html>
