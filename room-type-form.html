<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm loại phòng - Khách sạn</title>
    <link rel="stylesheet" href="css/room-type-form.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body data-page="rooms">
    <div class="container">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="breadcrumb">
                <a href="rooms.html">Quản lý phòng</a>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
                <span>Thêm loại phòng</span>
            </div>

            <div class="page-header">
                <h2>Thêm loại phòng mới</h2>
                <p>Nhập thông tin chi tiết của loại phòng</p>
            </div>

            <div class="form-container">
                <form id="addRoomTypeForm" onsubmit="handleSubmit(event)">
                    <div class="form-section">
                        <div class="section-header">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                            <h3>Thông tin cơ bản</h3>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="typeCode">
                                    Mã loại phòng <span class="required">*</span>
                                </label>
                                <input 
                                    type="number" 
                                    id="typeCode" 
                                    name="typeCode" 
                                    placeholder="Ví dụ: 001" 
                                    min="1"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="typeName">
                                    Tên loại phòng <span class="required">*</span>
                                </label>
                                <input 
                                    type="text" 
                                    id="typeName" 
                                    name="typeName" 
                                    placeholder="Phòng tiêu chuẩn" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="price">
                                    Đơn giá (VNĐ) <span class="required">*</span>
                                </label>
                                <input 
                                    type="number" 
                                    id="price" 
                                    name="price" 
                                    placeholder="150000" 
                                    min="0"
                                    step="10000"
                                    required
                                >
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="cancelForm()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                            Hủy bỏ
                        </button>
                        <button type="submit" class="btn-submit">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            Thêm loại phòng
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/room-type-form.js"></script>
    <script src="js/common.js"></script>
</body>
</html>
