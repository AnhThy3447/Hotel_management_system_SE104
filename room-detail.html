<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết phòng - Quản lý khách sạn</title>
    <link rel="stylesheet" href="css/room-detail.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<div class="container">
    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN -->
    <main class="main-content">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="rooms.html">Quản lý phòng</a>
            <span>/</span>
            <span>Chi tiết phòng</span>
        </div>

        <!-- HEADER -->
        <div class="page-header">
            <div>
                <h2 id="roomTitle">Chi tiết phòng</h2>
                <span id="roomStatus" class="badge"></span>
            </div>

            <div class="header-actions">
                <!-- ✅ FIX: link sang edit-room.html -->
                <button class="btn-secondary" id="editBtn">
                    Cập nhật
                </button>
            </div>
        </div>

        <!-- DETAIL -->
        <div class="detail-grid">

            <!-- INFO -->
            <div class="section-card">
                <h3>Thông tin phòng</h3>

                <div class="info-grid">
                    <div>Mã phòng: <b id="id"></b></div>
                    <div>Tên phòng: <b id="name"></b></div>
                    <div>Loại phòng: <b id="type"></b></div>
                    <div>Tầng: <b id="floor"></b></div>
                    <div>Giá: <b id="price"></b></div>
                </div>
            </div>

            <!-- EXTRA -->
            <div class="section-card">
                <h3>Ghi chú</h3>

                
            </div>

        </div>
    </main>
</div>

<!-- DATA + LOGIC -->
<script src="js/rooms.js"></script>
<script src="js/common.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const room = rooms.find(r => r.id === id);

    if (!room) {
        document.getElementById("roomTitle").textContent = "Không tìm thấy phòng";
        return;
    }

    // ===== FILL DATA =====
    document.getElementById("roomTitle").textContent = room.name;
    document.getElementById("id").textContent = room.id;
    document.getElementById("name").textContent = room.name;
    document.getElementById("type").textContent = room.typeName;
    document.getElementById("floor").textContent = room.floor;
    document.getElementById("price").textContent =
        Number(room.price).toLocaleString("vi-VN") + " VNĐ";

    // ===== STATUS =====
    const statusEl = document.getElementById("roomStatus");

    if (room.status === "available") {
        statusEl.textContent = "Trống";
        statusEl.className = "badge badge-available";
    } else if (room.status === "occupied") {
        statusEl.textContent = "Đang thuê";
        statusEl.className = "badge badge-occupied";
    } else {
        statusEl.textContent = "Dọn dẹp";
        statusEl.className = "badge badge-maintenance";
    }

    // ===== EDIT BUTTON FIX =====
    document.getElementById("editBtn").onclick = () => {
        window.location.href = `edit-room.html?id=${room.id}`;
    };
});
</script>

</body>
</html>
