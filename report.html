<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Báo cáo</title>
    <link rel="stylesheet" href="css/report.css" />
    <link rel="stylesheet" href="css/common.css" />
  </head>

  <body>
    <div class="container">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <main class="main-content">
        <!-- HEADER -->
        <div class="page-header">
          <div>
            <h2>Báo cáo</h2>
            <p>Xem và xuất báo cáo</p>
          </div>
          <button class="btn-export" onclick="exportReport()">
            Xuất báo cáo
          </button>
        </div>

        <!-- FILTER -->
        <div class="filter-section">
          <div class="filter-group">
            <label>Loại báo cáo</label>
            <select id="reportType" onchange="changeReportType()">
              <option value="revenue">Báo cáo doanh thu theo loại phòng</option>
              <option value="customer">Báo cáo lượng khách</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Loại báo cáo</label>
            <select id="filterType" onchange="changeFilterType()">
              <option value="month">Theo tháng</option>
              <option value="year">Theo năm</option>
            </select>
          </div>

          <div class="filter-group" id="monthBox">
            <label>Tháng</label>
            <input type="month" id="reportMonth" value="2026-05" />
          </div>

          <div class="filter-group" id="yearBox" style="display: none">
            <label>Năm</label>
            <input type="number" id="reportYear" value="2026" />
          </div>

          <button class="btn-filter" onclick="applyFilter()">Xem</button>
        </div>

        <!-- DOANH THU -->
        <div id="revenue-report" class="report-card">
          <h3 class="report-title">Báo cáo doanh thu</h3>

          <div class="info-row">
            Thời gian: <strong id="displayMonth">Tháng 5/2026</strong>
          </div>

          <div class="summary-row">
            <div class="summary-item">
              Tổng doanh thu:
              <strong class="highlight" id="totalRevenue">0</strong>
            </div>
            <div class="summary-item">
              Tổng lượt thuê:
              <strong class="highlight" id="totalCount">0</strong>
            </div>
          </div>

          <div class="table-container">
            <table class="report-table">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Loại phòng</th>
                  <th>Doanh thu</th>
                  <th>Tỉ lệ doanh thu</th>
                  <th>Lượt thuê</th>
                  <th>Tỉ lệ lượt thuê</th>
                  <th>Ghi chú</th>
                </tr>
              </thead>
              <tbody id="revenueBody"></tbody>
            </table>
          </div>
        </div>

        <!-- KHÁCH -->
        <div id="customer-report" class="report-card" style="display: none">
          <h3 class="report-title">Báo cáo lượng khách</h3>

          <div class="info-row">
            Thời gian: <strong id="displayMonth2">Tháng 5/2026</strong>
          </div>

          <div class="summary-row">
            Tổng khách:
            <strong class="highlight" id="totalCustomer">0</strong>
          </div>

          <div class="table-container">
            <table class="report-table">
              <thead>
                <tr>
                  <th>Tháng</th>
                  <th>Loại khách</th>
                  <th>Số lượng</th>
                  <th>Tỷ lệ</th>
                </tr>
              </thead>

              <tbody id="customerBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="js/report.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
