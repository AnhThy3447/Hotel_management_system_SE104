<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý Khách Sạn Paradise</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="page-container">
        
        <div class="left-panel">
            <div class="form-wrapper">
                <h2 class="sign-in-title">ĐĂNG NHẬP</h2>
                <p class="welcome-text">Hệ thống quản lý và vận hành khách sạn Paradise</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username" class="form-label">Tên đăng nhập</label>
                        <div class="input-with-icon">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span> 
                            <input type="text" id="username" name="username" class="form-input" placeholder="Nhập tên đăng nhập" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <div class="input-with-icon">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </span> 
                            <input type="password" id="password" name="password" class="form-input" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>

                    <div id="errorMessage" class="error-message"></div>

                    <button type="submit" class="submit-btn">Tiếp tục</button>
                </form>
            </div>
        </div>

        <div class="right-panel">
            <div class="quote-container">
                <p class="quote-text">
                    Chất lượng dịch vụ không đến từ những điều lớn lao, mà được xây dựng từ sự tận tâm trong từng công việc nhỏ mỗi ngày
                </p>
            </div>
        </div>

    </div>

    <script src="js/login.js"></script>
</body>
</html>
