<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cập nhật phòng - Quản lý khách sạn</title>
    <link rel="stylesheet" href="css/edit-room.css" />
    <link rel="stylesheet" href="css/common.css" />
  </head>
  <body data-page="rooms">
    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        
        <div class="page-header">
          <h2>Cập nhật thông tin phòng</h2>
          <button type="button" class="btn-delete" onclick="deleteRoom()">
            Xóa phòng
          </button>
        </div>

        <form class="room-form" onsubmit="handleSubmit(event)">
          <div class="form-section">
            <h3>Thông tin cơ bản</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="roomCode"
                  >Số phòng <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="roomCode"
                  name="roomCode"
                  value="P101"
                  placeholder="Ví dụ: P101"
                  required
                />
              </div>

              <div class="form-group">
                <label for="roomName"
                  >Tên phòng <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="roomName"
                  name="roomName"
                  value="Phòng 101"
                  placeholder="Ví dụ: Phòng 101"
                  required
                />
              </div>

              <div class="form-group">
                <label for="roomType"
                  >Loại phòng <span class="required">*</span></label
                >
                <select
                  id="roomType"
                  name="roomType"
                  required
                  onchange="updatePrice()"
                >
                  <option value="">-- Chọn loại phòng --</option>
                  <option value="standard" selected>Phòng tiêu chuẩn</option>
                  <option value="deluxe">Phòng cao cấp</option>
                  <option value="suite">Phòng hạng sang</option>
                </select>
              </div>

              <div class="form-group">
                <label for="price"
                  >Đơn giá (VNĐ) <span class="required">*</span></label
                >
                <input
                  type="number"
                  id="price"
                  name="price"
                  value="150000"
                  placeholder="150000"
                  required
                />
              </div>
              <div class="form-group">
                <label for="status"
                  >Tình trạng phòng <span class="required">*</span></label
                >
                <select id="status" name="status" required>
                  <option value="available">Trống</option>
                  <option value="occupied">Đang thuê</option>
                  <option value="maintenance">Dọn dẹp</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>Ghi chú</h3>

            <div class="form-group">
              <textarea
                id="notes"
                name="notes"
                placeholder="Nhập ghi chú..."
                rows="4"
              ></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button
              type="button"
              class="btn-cancel"
              onclick="window.location.href = 'rooms.html'"
            >
              Hủy
            </button>
            <button type="submit" class="btn-submit">Cập nhật</button>
          </div>
        </form>
      </main>
    </div>

    <script src="js/edit-room.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
